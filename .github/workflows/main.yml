name: Control de Calidad del Hotel

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java para NetBeans
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Descargar libreria CopyLibs Oficial de NetBeans
      run: |
        mkdir -p lib
        curl -L -s -o lib/org-netbeans-modules-java-j2seproject-copylibstask.jar https://apache.org

    - name: Compilar el proyecto burlando el servidor y CopyLibs
      run: |
        mkdir -p fake-server
        ant -Dno.dependencies=true -Dj2ee.server.home=fake-server -Dlibs.CopyLibs.classpath=lib/org-netbeans-modules-java-j2seproject-copylibstask.jar -Dlibs.CopyLibs.instance=lib/org-netbeans-modules-java-j2seproject-copylibstask.jar compile
