name: Control de Calidad del Hotel

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java para NetBeans
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Compilar el proyecto del hotel con Ant (Sin Validar Servidor)
      run: ant -Dno.dependencies=true compile
